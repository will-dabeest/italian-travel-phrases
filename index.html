<!doctype html>
<html lang="en" data-theme="dark" data-contrast="normal">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Italian Trainer" />
    <meta name="description" content="Practice practical Italian travel phrases with speech recognition and spaced repetition." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preload" href="/phrases.json" as="fetch" crossorigin="anonymous" />
    <link rel="preload" href="/assets/logo.svg" as="image" type="image/svg+xml" />
    <link rel="preload" href="/assets/icons.svg" as="image" type="image/svg+xml" />
    <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <title>Italian Travel Phrase Trainer</title>
    <style>
      :root { color-scheme: dark light; }
      html, body { margin: 0; background: #0f0f0f; color: #f7f7f7; font-family: Inter, Segoe UI, system-ui, sans-serif; }
      #app { min-height: 100vh; }
      .boot { display:flex; min-height:100vh; align-items:center; justify-content:center; color:#cfd3da; }
      .boot__pulse { width:12px; height:12px; border-radius:50%; background:#7baf7b; margin-right:.75rem; animation:pulse 1.2s infinite; }
      @keyframes pulse { 0%{transform:scale(.8);opacity:.6} 70%{transform:scale(1.2);opacity:1} 100%{transform:scale(.8);opacity:.6} }
    </style>
  </head>
  <body>
    <div id="app" aria-live="polite">
      <div class="boot"><span class="boot__pulse"></span>Loading your trainer…</div>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
