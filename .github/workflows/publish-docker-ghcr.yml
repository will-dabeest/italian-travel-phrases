name: Publish Docker Image

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  packages: write

jobs:
  detect-publish-changes:
    name: Detect publish-relevant changes
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.filter.outputs.publish }}

    steps:
      - name: Filter changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            publish:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - 'index.html'
              - 'main.ts'
              - 'style.css'
              - 'types.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vite.config.js'
              - 'vite.react.config.ts'
              - 'react.html'
              - 'public/**'
              - 'react/**'
              - 'features/**'
              - 'state/**'
              - 'ui/**'
              - 'utils/**'

  verify:
    name: Verify gates before publish
    needs: detect-publish-changes
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && needs.detect-publish-changes.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run parity gates
        run: npm run ci:parity:gates

      - name: Validate parity checklist
        run: npm run ci:parity:checklist

      - name: Run all declared parity step tests
        run: npm run ci:parity:all-steps

  publish:
    name: Publish image to GHCR
    needs: [detect-publish-changes, verify]
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && needs.detect-publish-changes.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/italian-travel-phrase-trainer
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}