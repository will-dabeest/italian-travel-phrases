name: Publish Docker Image

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Bypass change filter and publish current ref'
        required: true
        default: false
        type: boolean
      publish_ref:
        description: 'Git ref to publish when manually dispatched'
        required: false
        default: main
        type: string

permissions:
  contents: read
  packages: write

jobs:
  detect-publish-changes:
    name: Detect publish-relevant changes
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.decide.outputs.should_publish }}

    steps:
      - name: Filter changed files
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            publish:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - 'index.html'
              - 'main.ts'
              - 'style.css'
              - 'types.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vite.config.js'
              - 'vite.react.config.ts'
              - 'react.html'
              - 'public/**'
              - 'react/**'
              - 'features/**'
              - 'state/**'
              - 'ui/**'
              - 'utils/**'

      - name: Determine publish eligibility
        id: decide
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_publish }}" == "true" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.filter.outputs.publish }}" == "true" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  verify:
    name: Verify gates before publish
    needs: detect-publish-changes
    if: needs.detect-publish-changes.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || inputs.publish_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run parity gates
        run: npm run ci:parity:gates

      - name: Validate parity checklist
        run: npm run ci:parity:checklist

      - name: Run all declared parity step tests
        run: npm run ci:parity:all-steps

  publish:
    name: Publish image to GHCR
    needs: [detect-publish-changes, verify]
    if: needs.detect-publish-changes.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || inputs.publish_ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/italian-travel-phrase-trainer
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}